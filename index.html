<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>CRUD</title>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>
    <div class="container">
        <h1>CRUD Applikation</h1>
        <form id="crud-form">
            <input type="text" id="name" placeholder="Namn" required>
            <input type="email" id="email" placeholder="Email" required>
            <button type="submit">Lägg till</button>
        </form>
        <table id="crud-table">
            <thead>
                <tr>
                    <th>Namn</th>
                    <th>Email</th>
                    <th>Åtgärder</th>
                </tr>
            </thead>
            <tbody>
                <!-- Data will be dynamically inserted here -->
            </tbody>
        </table>
    </div>
    <footer class="footer">
        <!-- Footer content will be dynamically inserted by JavaScript -->
    </footer>
</body>
</html>
